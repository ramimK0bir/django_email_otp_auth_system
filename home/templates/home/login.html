{% extends "utility/base.home.html" %}
{% block title %}Login{% endblock title %}
{% block head %}
<style>
  @keyframes fadeSlideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
  @keyframes bgShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes inputGlow {
    0%,100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
    50% { box-shadow: 0 0 0 4px rgba(99,102,241,0.2); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes cardIn { from { opacity:0; transform:translateY(50px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }

  body { background: #0f0f1a; }

  .auth-bg {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0f1a, #1a1a2e, #16213e, #0f3460, #1a1a2e);
    background-size: 400% 400%;
    animation: bgShift 10s ease infinite;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 1rem;
    position: relative; overflow: hidden;
  }

  .auth-card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 2.5rem;
    width: 100%; max-width: 460px;
    animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .auth-icon-wrap {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem;
    box-shadow: 0 0 30px rgba(99,102,241,0.5);
    animation: fadeSlideUp 0.5s ease 0.2s both;
  }

  .auth-title { color: #fff; font-weight: 800; font-size: 1.6rem; animation: fadeSlideUp 0.5s ease 0.3s both; }
  .auth-sub { color: rgba(255,255,255,0.45); font-size: 0.9rem; animation: fadeSlideUp 0.5s ease 0.35s both; }

  .form-label { color: rgba(255,255,255,0.7); font-size: 0.82rem; font-weight: 600; letter-spacing: 0.5px; }

  .auth-input {
    background: rgba(255,255,255,0.06) !important;
    border: 1px solid rgba(255,255,255,0.12) !important;
    color: #fff !important;
    border-radius: 12px !important;
    padding: 12px 16px !important;
    transition: all 0.3s !important;
  }
  .auth-input::placeholder { color: rgba(255,255,255,0.25) !important; }
  .auth-input:focus {
    background: rgba(99,102,241,0.08) !important;
    border-color: rgba(99,102,241,0.6) !important;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15) !important;
    outline: none !important;
    animation: inputGlow 1.5s ease infinite;
  }

  .input-group .auth-input { border-radius: 12px 0 0 12px !important; }
  .toggle-btn {
    background: rgba(255,255,255,0.06) !important;
    border: 1px solid rgba(255,255,255,0.12) !important;
    border-left: none !important;
    color: rgba(255,255,255,0.5) !important;
    border-radius: 0 12px 12px 0 !important;
    transition: all 0.2s !important;
  }
  .toggle-btn:hover { background: rgba(99,102,241,0.15) !important; color: #fff !important; }

  .btn-auth {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none; color: #fff;
    padding: 13px; font-weight: 700; font-size: 1rem;
    border-radius: 12px; width: 100%;
    transition: all 0.3s;
    position: relative; overflow: hidden;
  }
  .btn-auth::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
    transform: translateX(-100%); transition: transform 0.5s;
  }
  .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,0.5); }
  .btn-auth:hover::after { transform: translateX(100%); }
  .btn-auth:active { transform: translateY(0); }

  .auth-link { color: #818cf8; text-decoration: none; font-weight: 600; transition: color 0.2s; }
  .auth-link:hover { color: #a78bfa; }

  .forgot-link { color: rgba(255,255,255,0.4); font-size: 0.82rem; text-decoration: none; transition: color 0.2s; }
  .forgot-link:hover { color: #818cf8; }

  .glow-blob {
    position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; opacity: 0.15;
  }

  .field-wrap { animation: fadeSlideUp 0.5s ease both; }
</style>
{% endblock head %}

{% block body %}
<div class="auth-bg">
  <div class="glow-blob" style="width:400px;height:400px;background:#6366f1;top:-100px;left:-100px;"></div>
  <div class="glow-blob" style="width:300px;height:300px;background:#8b5cf6;bottom:-80px;right:-80px;"></div>

  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="auth-icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="white" viewBox="0 0 16 16">
          <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm5 5a5 5 0 0 0-10 0h10z"/>
        </svg>
      </div>
      <h3 class="auth-title">Welcome Back</h3>
      <p class="auth-sub">Sign in to your {{site_name}} account</p>
    </div>

    <form action="{% url 'LoginHOME' %}" method="post">
      {% csrf_token %}

      <div class="mb-3 field-wrap" style="animation-delay:0.4s;">
        <label class="form-label">Gmail Address</label>
        <input type="email" class="form-control auth-input" name="email"
          placeholder="john@gmail.com" value="{{credential.email}}" required>
      </div>

      <div class="mb-2 field-wrap" style="animation-delay:0.5s;">
        <label class="form-label">Password</label>
        <div class="input-group">
          <input type="password" class="form-control auth-input" id="password" name="password"
            placeholder="••••••••" required>
          <button class="btn toggle-btn" type="button" onclick="togglePassword('password',this)">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
              <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
              <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="text-end mb-4 field-wrap" style="animation-delay:0.55s;">
        <a href="{% url 'PasswordResetHOME' %}" class="forgot-link">Forgot password?</a>
      </div>

      <div class="field-wrap" style="animation-delay:0.6s;">
        <button type="submit" class="btn-auth">Sign In</button>
      </div>

      <p class="text-center mt-3 mb-0 field-wrap" style="color:rgba(255,255,255,0.4);font-size:0.88rem;animation-delay:0.65s;">
        Don't have an account? <a href="{% url 'SignupHOME' %}" class="auth-link">Register</a>
      </p>
    </form>
  </div>
</div>

<script>
  function togglePassword(fieldId, btn) {
    const input = document.getElementById(fieldId);
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    btn.querySelector('svg').innerHTML = isPassword
      ? '<path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7.028 7.028 0 0 0-2.79.588l.77.771A5.944 5.944 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.134 13.134 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755-.165.165-.337.328-.517.486l.708.709z"/><path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829l.822.822zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829z"/><path d="M3.35 5.47c-.18.16-.353.322-.518.487A13.134 13.134 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7.029 7.029 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709z"/><path fill-rule="evenodd" d="M13.646 14.354l-12-12 .708-.708 12 12-.708.708z"/>'
      : '<path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/><path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>';
  }
</script>
{% endblock body %}
